name: comicverse
description: A production-ready Flutter comic reader with offline reading, downloads, favorites, and Firebase integration.
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cached_network_image: ^3.4.1
  cloud_firestore: ^5.6.0
  cupertino_icons: ^1.0.8
  dio: ^5.7.0
  equatable: ^2.0.7
  firebase_analytics: ^11.3.6
  firebase_auth: ^5.3.4
  firebase_core: ^3.9.0
  firebase_messaging: ^15.1.6
  firebase_storage: ^12.3.7
  flutter_bloc: ^8.1.6
  flutter_secure_storage: ^9.2.2
  go_router: ^14.6.2
  google_sign_in: ^6.2.2
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  path_provider: ^2.1.5
  share_plus: ^10.1.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
